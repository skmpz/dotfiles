separator_block_width=20

[mail]
label= 
command=~/.config/i3/mail.sh
interval=60
color=#a3daf5

[os]
label= 
command=~/.config/i3/os.sh
interval=100
color=#a3daf5

[memory]
label= 
command=/usr/lib/i3blocks/memory
interval=30
color=#a3daf5

[disk-home]
label= 
command=~/.config/i3/disk.sh $HOME
interval=30
color=#a3daf5

[disk-root]
label= 
command=~/.config/i3/disk.sh /
interval=30
color=#a3daf5

[disk-extra]
label= 
command=~/.config/i3/disk.sh /data
interval=30
color=#a3daf5

